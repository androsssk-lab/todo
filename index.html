<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <section class="home">
        <div class="home-container">
            <div class="side-bar">
                <h1 class="main-title">
                    To-Do....huuuu
                </h1>
                <div class="nav-list">
                    <h3 class="list-title">Meine Listen</h3>
                    <div class="nav">
                    </div>
                    <button class="add-list-btn">
                        <span class="plus">Füge deine Liste hinzu</span>
                    </button>
                </div>
                <div class="counter">
                    <div class="counter-container">
                        <h3 class="counter-title">Complete</h3>
                        <span class="counter-number">0 / 0</span>
                    </div>
                </div>
            </div>
            <div class="home-content">
                <div class="header">
                    <button class="menu-btn">
                        <span class="menu-icon"></span>
                        <span class="menu-icon"></span>
                        <span class="menu-icon"></span>
                    </button>
                    <h2 class="header-title"></h2>
                </div>
                <div class="todo-list">
                    <button class="add-btn">
                        <span class="plus">+ Add</span>
                    </button>
                    <p class="list-desc">
                        Du hast noch keine Aufgaben :)
                    </p>
                    <div class="inputs">

                    </div>
                    <div class="todo-cards">
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
